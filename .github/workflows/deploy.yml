name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production

# Serialize deployments per branch — never cancel an in-flight deploy.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the GitHub Environment from the branch name or manual input.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        name: Determine environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "Resolved: $ENV"

  # ---------------------------------------------------------------------------
  # Deploy.
  #
  # Secrets required in the GitHub Environment:
  #   DEPLOY_PRIVATE_KEY   ED25519 private key (PEM, real newlines)
  #   DEPLOY_HOST          server hostname or IP
  #   DEPLOY_USER          SSH login user
  #   DEPLOY_PATH          absolute path to the project root on the server
  #   DEPLOY_PORT          SSH port (optional — defaults to 22 if empty)
  #
  # SSH authentication uses webfactory/ssh-agent.
  # No ~/.ssh/config is created. Host, port, and user are passed as explicit
  # command-line arguments to every ssh invocation.
  # SSH_OPTS is exported via $GITHUB_ENV once in "Configure SSH" so every
  # later step gets the same flags without repetition.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy → ${{ needs.resolve.outputs.environment }}
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    timeout-minutes: 30

    # All four secrets available to every step as plain env vars.
    # No per-step env: block needed.
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      COMPOSER_GITHUB_TOKEN: ${{ secrets.COMPOSER_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── SSH authentication ─────────────────────────────────────────────────
      # webfactory/ssh-agent receives the raw secret through the Actions
      # expression engine, normalises line endings in Node.js, and loads the
      # key into ssh-agent. No key file is written to disk.
      # SSH_AUTH_SOCK is set automatically for all subsequent steps.
      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_PRIVATE_KEY }}

      # ssh-add -l prints the fingerprint only — never the private key.
      - name: Verify SSH key loaded
        run: |
          COUNT=$(ssh-add -l 2>/dev/null | grep -c 'SHA256' || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::SSH agent has no keys. Re-store DEPLOY_PRIVATE_KEY with:" \
                 "cat ~/.ssh/id_ed25519 | gh secret set DEPLOY_PRIVATE_KEY --env <env>"
            exit 1
          fi
          echo "Agent has $COUNT key(s) loaded:"
          ssh-add -l

      # ── SSH connection ─────────────────────────────────────────────────────
      # • DEPLOY_PORT defaults to 22 if the secret is empty.
      # • ssh-keyscan pins the server host key before any connection attempt.
      #   StrictHostKeyChecking=yes then verifies against that pinned key on
      #   every connection — not just the first (accept-new is TOFU, not strict).
      # • SSH_PORT and SSH_OPTS are written to $GITHUB_ENV so that all later
      #   steps reference a single source of truth for connection flags.
      # • BatchMode=yes: fails immediately if the key is rejected — no prompt.
      # • ConnectTimeout=10: fast failure if the server is unreachable.
      - name: Configure SSH and verify connection
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

          echo "SSH_PORT=$PORT" >> "$GITHUB_ENV"
          echo "SSH_OPTS=-p $PORT -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10" >> "$GITHUB_ENV"

          echo "OpenSSH client:"
          ssh -V
          echo "Connecting to $DEPLOY_HOST:$PORT..."
          set +e
          SSH_OUTPUT=$(ssh -p "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "echo SSH_OK" 2>&1)
          SSH_STATUS=$?
          echo "$SSH_OUTPUT"
          if [ $SSH_STATUS -ne 0 ]; then
            echo "SSH failed with exit code $SSH_STATUS"
            exit $SSH_STATUS
          fi
          set -e

      # ── Deployment ────────────────────────────────────────────────────────
      # The repository is updated to the exact target SHA before deploy.sh runs.
      # This guarantees deploy.sh always executes from the post-update codebase,
      # eliminating the self-update race (a running script cannot git pull itself).
      # git reset --hard is safe here: the server never has uncommitted changes.
      - name: Update repository on server
        run: |
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' \
             && git fetch --all --tags --prune \
             && git checkout '${{ github.ref_name }}' \
             && git reset --hard '${{ github.sha }}'"

      - name: Run deploy.sh on server
        run: |
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" \
            "export COMPOSER_GITHUB_TOKEN='$COMPOSER_GITHUB_TOKEN'; cd '$DEPLOY_PATH' && bash scripts/deploy.sh '${{ github.sha }}' '${{ github.ref_name }}' '${{ github.actor }}'"

      # ── On failure ────────────────────────────────────────────────────────
      - name: Report failure and rollback hint
        if: failure()
        run: |
          echo "::error::Deployment of ${{ github.sha }} to ${{ needs.resolve.outputs.environment }} FAILED."
          echo ""
          echo "Manual rollback:"
          echo "  ssh $SSH_OPTS $DEPLOY_USER@$DEPLOY_HOST 'cd $DEPLOY_PATH && bash scripts/rollback.sh'"
