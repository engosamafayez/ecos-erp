name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production

# Serialize deployments per branch — never cancel an in-flight deploy.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the GitHub Environment from the branch name or manual input.
  # Using a separate job so `environment:` in the deploy job can reference an
  # output, which enables environment-scoped secrets and protection rules.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        name: Determine environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "Resolved: $ENV"

  # ---------------------------------------------------------------------------
  # Deploy.
  # All secrets below (DEPLOY_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER,
  # DEPLOY_PATH, DEPLOY_PORT) must be configured per GitHub Environment.
  # See docs/deployment/README.md → "GitHub Secrets" for the full list.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy → ${{ needs.resolve.outputs.environment }}
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── SSH setup ─────────────────────────────────────────────────────────
      # webfactory/ssh-agent is the canonical GitHub Actions solution for SSH auth.
      # It receives the secret value through the Actions expression engine (not a
      # shell variable), normalises line endings in Node.js, and loads the key into
      # ssh-agent. No key file is ever written to disk. SSH_AUTH_SOCK is exported
      # automatically so every ssh/rsync call in this job uses the agent.
      #
      # If DEPLOY_PRIVATE_KEY is malformed (literal \n instead of real newlines,
      # wrong header, truncated body) the action fails here with a clear parse
      # error — before any connection attempt is made.
      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_PRIVATE_KEY }}

      # Explicit post-load check: confirm at least one key is in the agent.
      # ssh-add -l prints the fingerprint (public metadata only — never the key).
      # Fails fast with a diagnostic if the agent is empty for any reason.
      - name: Verify SSH key loaded
        run: |
          KEY_COUNT=$(ssh-add -l 2>/dev/null | grep -c 'SHA256' || true)
          if [ "$KEY_COUNT" -eq 0 ]; then
            echo "::error::SSH agent has no keys. DEPLOY_PRIVATE_KEY may be malformed." \
                 "Re-store it as: cat ~/.ssh/deploy_key | gh secret set DEPLOY_PRIVATE_KEY"
            exit 1
          fi
          echo "Agent loaded $KEY_COUNT key(s):"
          ssh-add -l

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Collect the server's public host key and pin it to known_hosts.
          # StrictHostKeyChecking yes (below) then enforces verification on every
          # connection — not just the first one (accept-new is TOFU, not strict).
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

          # No IdentityFile: the SSH agent (SSH_AUTH_SOCK) provides the key.
          # StrictHostKeyChecking yes: the host key is already pinned above;
          # any mismatch on a subsequent connection aborts rather than prompting.
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $DEPLOY_HOST
            Port $PORT
            User $DEPLOY_USER
            StrictHostKeyChecking yes
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

          echo "OpenSSH client version:"
          ssh -V
          echo "Attempting test connection to deploy-target..."
          ssh deploy-target "echo SSH_OK"

      # ── Sync scripts ──────────────────────────────────────────────────────
      # Push the latest scripts/ to the server before running them so the
      # remote always executes the version that matches this commit.
      - name: Sync deployment scripts
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh deploy-target "mkdir -p '$DEPLOY_PATH/scripts'"
          rsync -az --delete \
            -e "ssh -F ~/.ssh/config" \
            scripts/ \
            "deploy-target:$DEPLOY_PATH/scripts/"

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Run deploy.sh on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_SHA:    ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_ACTOR:  ${{ github.actor }}
        run: |
          ssh deploy-target \
            "cd '$DEPLOY_PATH' && bash scripts/deploy.sh '$GIT_SHA' '$GIT_BRANCH' '$GIT_ACTOR'"

      # ── On failure ────────────────────────────────────────────────────────
      - name: Report failure and rollback hint
        if: failure()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "::error::Deployment of ${{ github.sha }} to ${{ needs.resolve.outputs.environment }} FAILED."
          echo ""
          echo "To roll back manually:"
          echo "  ssh $DEPLOY_USER@$DEPLOY_HOST 'cd $DEPLOY_PATH && bash scripts/rollback.sh'"
