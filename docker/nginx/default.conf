# =============================================================================
# ECOS ERP — Nginx virtual host
#
# Responsibilities:
#   /healthz        Infrastructure health check (nginx-level, no PHP)
#   /build-info     Static JSON metadata baked into image
#   /api/health     Application health stub (nginx-level for infra verification)
#   /app/*          React SPA with correct cache headers
#   /api/*          Proxy to PHP-FPM (app:9000)
#   /               Laravel backend via PHP-FPM
#
# Gzip compression enabled for all text types.
# Security headers applied at server level (inherited by most locations).
# =============================================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # -------------------------------------------------------------------------
    # Security headers
    # Applied at server scope so all locations inherit them unless they define
    # their own add_header directives (which would shadow the parent block).
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # -------------------------------------------------------------------------
    # Infrastructure endpoints
    # These return before hitting PHP-FPM and must never require the app to run.
    # -------------------------------------------------------------------------

    # Container healthcheck endpoint — used by docker-compose and load balancers.
    # Returns 200 as long as nginx is alive.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Build metadata — static JSON file baked into the nginx image at build time.
    # default_type avoids add_header so parent security headers are inherited.
    location = /build-info {
        access_log off;
        default_type "application/json; charset=utf-8";
        try_files $uri =404;
    }

    # Application health stub — nginx-level response for infrastructure verification.
    # A PHP-level health check should be added to routes/api.php as a follow-up.
    location = /api/health {
        access_log off;
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"status":"ok","service":"ecos-erp"}\n';
    }

    # -------------------------------------------------------------------------
    # React SPA — served from public/app/
    #
    # Cache strategy:
    #   index.html             no-cache (entry point; references hashed bundles)
    #   assets/*.js|css|map    immutable (Vite content-hashed filenames, 1 year)
    #   other SPA assets       1 day (SVG icons, favicons — not hashed)
    # -------------------------------------------------------------------------

    # Entry point — must always be fetched fresh; it references hashed bundles.
    location = /app/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Vite-hashed JS, CSS, and source maps — immutable for one year.
    location ~* ^/app/assets/.*\.(js|css|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Non-hashed SPA assets (icons, favicons) — conservative 1-day TTL.
    location ~* ^/app/.*\.(svg|ico|png|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA catch-all — client-side routes fall through to index.html.
    # Nginx re-runs location matching on the internal redirect to /app/index.html,
    # so the no-cache block above is applied automatically.
    location /app {
        try_files $uri $uri/ /app/index.html;
    }

    # -------------------------------------------------------------------------
    # Static files
    # -------------------------------------------------------------------------
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # -------------------------------------------------------------------------
    # Default — attempt static file, then rewrite to Laravel index.php
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    # -------------------------------------------------------------------------
    # PHP-FPM proxy
    # SCRIPT_FILENAME points to the path inside the *app* container
    # (not the nginx container) because PHP-FPM runs there.
    # -------------------------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param           DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout    120;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         8 128k;
        fastcgi_busy_buffers_size 256k;
    }

    # -------------------------------------------------------------------------
    # Security: deny access to hidden files (e.g. .env, .git, .htaccess)
    # Exempt .well-known for ACME / TLS certificate challenges.
    # -------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
