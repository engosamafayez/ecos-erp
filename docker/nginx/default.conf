# ECOS ERP — Nginx virtual host
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64M;

    # -------------------------------------------------------------------------
    # Security headers
    # HSTS is intentionally omitted here — add it only after TLS is confirmed.
    # CSP is intentionally omitted here — requires per-app tuning for the SPA.
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # -------------------------------------------------------------------------
    # React/Vite SPA — served from public/app
    #
    # Cache strategy:
    #   index.html          → no-cache   (always fetched fresh; it references hashed bundles)
    #   assets/*.js|css|map → immutable  (Vite content-hashed names; safe to cache for 1 year)
    #   other static assets → 1 day      (favicons, SVG icons — not hashed, rarely change)
    #
    # How it works: Vite bakes a unique hash into every JS/CSS filename on each
    # production build (e.g. index-BEUwJNcu.js).  Browsers can safely cache these
    # forever because the filename changes whenever the content changes.  The only
    # file that is never hashed is index.html itself, so it must always be
    # re-fetched so the browser picks up the new hashed bundle references.
    # -------------------------------------------------------------------------

    # index.html — must never be cached; it is the entry point that loads hashed bundles.
    location = /app/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Vite-hashed JS, CSS, and source-map files — safe to cache for 1 year.
    # The hash in the filename guarantees freshness after every build.
    location ~* ^/app/assets/.*\.(js|css|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other SPA static assets (SVG icons, favicons) — 1-day TTL.
    # These are not content-hashed so we use a conservative TTL.
    location ~* ^/app/.*\.(svg|ico|png|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA catch-all — client-side routes fall back to index.html.
    # Nginx will re-run location matching on the internal redirect to
    # /app/index.html, so the no-cache block above is applied automatically.
    location /app {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Lightweight endpoint used by the container healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Build metadata — served from the file baked into the image at build time.
    # Returns JSON: {"version":"...","commit":"...","built_at":"...","environment":"production"}
    # default_type is used (not add_header) so parent security headers are inherited.
    location = /build-info {
        access_log off;
        default_type "application/json; charset=utf-8";
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
