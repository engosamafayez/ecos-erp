; ECOS ERP — Supervisor process manager
; Runs PHP-FPM, the Laravel queue worker, and the scheduler in one container.
[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; ---------------------------------------------------------------------------
; PHP-FPM — serves the application to Nginx over port 9000
; ---------------------------------------------------------------------------
[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ---------------------------------------------------------------------------
; Queue worker — processes the Redis-backed queue
; ---------------------------------------------------------------------------
[program:laravel-queue]
command=php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
user=www-data
numprocs=1
autostart=true
autorestart=true
stopwaitsecs=3600
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ---------------------------------------------------------------------------
; Scheduler — runs due scheduled tasks every minute (Laravel schedule:work)
; ---------------------------------------------------------------------------
[program:laravel-schedule]
command=php /var/www/html/artisan schedule:work
user=www-data
numprocs=1
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
