; ECOS ERP — PHP-FPM pool override
[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; Surface FPM status to the healthcheck/monitoring if needed.
pm.status_path = /fpm-status
ping.path = /fpm-ping
