name: ecos-erp

###############################################################################
# ECOS ERP — Development environment
#
# Services: app (PHP-FPM 8.4 + Supervisor) · nginx · mysql · redis · mailpit
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Application — PHP-FPM 8.4, Composer, Node, Supervisor (queue + scheduler)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: ecos-erp/app:latest
    container_name: ecos-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Web server — Nginx (serves public/ and proxies PHP to app:9000)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ecos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Database — MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: ecos-mysql
    restart: unless-stopped
    command: --mysql-native-password=OFF
    environment:
      MYSQL_DATABASE: ecos_erp
      MYSQL_USER: ecos
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Africa/Cairo
    ports:
      - "127.0.0.1:3306:3306"   # localhost only — not publicly exposed
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/ecos.cnf:ro
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecos", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Cache / Queue backend — Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"   # localhost only — not publicly exposed
    volumes:
      - redis-data:/data
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Mail — Mailpit (SMTP sink + web UI)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecos-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:1025:1025"   # SMTP  — localhost only (access via SSH tunnel in dev)
      - "127.0.0.1:8025:8025"   # Web UI — localhost only (access via SSH tunnel in dev)
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# -----------------------------------------------------------------------------
# Named volumes (persist data across container restarts)
# -----------------------------------------------------------------------------
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# -----------------------------------------------------------------------------
# Bridge network — isolated inter-service communication
# -----------------------------------------------------------------------------
networks:
  ecos-network:
    driver: bridge
