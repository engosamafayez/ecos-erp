name: ecos-erp

# =============================================================================
# ECOS ERP — Production Docker Compose
#
# Architecture: immutable image-based deployment.
# Every service runs from a built image. No application source code is
# bind-mounted. Runtime-mutable data lives in named volumes only.
#
# Services
#   app      PHP 8.4-FPM + Supervisor (queue worker + scheduler)
#   nginx    Static server + PHP-FPM proxy (SPA baked into image)
#   mysql    MySQL 8.4
#   redis    Redis 7 (queue backend, cache)
#   mailpit  SMTP sink (replace with real MTA before go-live)
#
# Named volumes (runtime-mutable data only):
#   app-storage   Laravel storage/     (uploads, sessions, logs)
#   mysql-data    MySQL data directory
#   redis-data    Redis AOF persistence
#
# bootstrap/cache is NOT a named volume — it is baked into the app image
# during docker build (package:discover + route:cache + event:cache).
# A volume here would shadow the baked-in files. See TASK-INFRA-002 Rule 5.
#
# Development overrides live in docker-compose.override.yml and are
# auto-merged by Docker Compose locally. deploy.sh targets this file
# explicitly via -f docker-compose.yml to prevent that merge on the server.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — PHP-FPM 8.4 + Supervisor
  # Runs: php-fpm, artisan queue:work, artisan schedule:work
  #
  # IMMUTABLE: the image already contains:
  #   • vendor/ (composer --no-dev, optimised autoloader)
  #   • public/app/ (Vite SPA)
  #   • bootstrap/cache/ (package:discover + route:cache + event:cache)
  # The entrypoint only performs: wait mysql → storage → link → key → exec
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: ecos-erp/app:latest
    container_name: ecos-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # storage/ only — uploads, sessions, logs, compiled views.
      # bootstrap/cache/ is intentionally absent: it is baked into the image.
      # .env is intentionally absent: all config is injected via env_file above.
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecos-network
    healthcheck:
      # Pings the PHP-FPM process via its FastCGI management interface.
      # Requires libfcgi-bin in the image (installed in Dockerfile Stage 3).
      # A healthy FPM means the process manager accepted the ping — it does
      # not require DB or Redis, but those are already healthy via depends_on.
      test:
        - "CMD-SHELL"
        - >
          SCRIPT_NAME=/fpm-ping
          SCRIPT_FILENAME=/fpm-ping
          REQUEST_METHOD=GET
          cgi-fcgi -bind -connect 127.0.0.1:9000 >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # entrypoint: wait mysql + storage setup; no optimize

  # ---------------------------------------------------------------------------
  # nginx — Custom image with React SPA + build-info baked in (Stage 4)
  #
  # Healthcheck uses the real Laravel /api/health endpoint (Rule 7):
  #   nginx → PHP-FPM → HealthController → DB::getPdo() + Redis::ping()
  # This is only "healthy" when the entire application stack is operational.
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx
    image: ecos-erp/nginx:latest
    container_name: ecos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Vhost config only — allows tuning without a full image rebuild.
      # The SPA and build-info inside the image are NOT affected by this mount.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # User-uploaded files (logos, product images, etc.).
      # Mounted read-only; only the app container writes here via PHP-FPM.
      - app-storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ecos-network
    healthcheck:
      # Full-stack health check through the real Laravel endpoint.
      # Tests: nginx alive + PHP-FPM responding + DB connected + Redis connected.
      # Returns 200 only when all three dependencies are healthy.
      test:
        - "CMD-SHELL"
        - >
          wget -q -O- http://127.0.0.1/api/health 2>/dev/null
          | grep -q '"status":"ok"' || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # mysql — MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: ecos-mysql
    restart: unless-stopped
    command: --mysql-native-password=OFF
    environment:
      MYSQL_DATABASE:      ecos_erp
      MYSQL_USER:          ecos
      MYSQL_PASSWORD:      Staging2026Ecos!
      MYSQL_ROOT_PASSWORD: Staging2026Root!
      TZ:                  Africa/Cairo
    ports:
      - "127.0.0.1:3306:3306"   # localhost-only; not publicly exposed
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/ecos.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecos", "-pStaging2026Ecos!"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # redis — Redis 7 (queue + cache backend)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"   # localhost-only
    volumes:
      - redis-data:/data
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # mailpit — SMTP sink + web UI
  # Replace with a real MTA (SES / Mailgun / Postfix) before production go-live.
  # All ports are bound to 127.0.0.1 — not publicly reachable.
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecos-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES:             500
      MP_SMTP_AUTH_ACCEPT_ANY:     1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI (SSH-tunnel for remote access)
    networks:
      - ecos-network

# =============================================================================
# Named volumes
#
# app-cache is intentionally absent (TASK-INFRA-002 Rule 5).
# bootstrap/cache is baked into the ecos-erp/app image — no volume needed.
# =============================================================================
volumes:
  app-storage:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  ecos-network:
    driver: bridge
