name: ecos-erp

###############################################################################
# ECOS ERP — Production environment
#
# This file is the canonical production configuration.
# It is image-based and immutable: every service runs from a built image;
# no application source code is bind-mounted.
#
# Services: app (PHP-FPM 8.4 + Supervisor) · nginx · mysql · redis · mailpit
#
# Development overrides (source bind-mounts) live in docker-compose.override.yml
# and are auto-applied by Docker Compose when running locally.
# deploy.sh explicitly targets this file alone via -f docker-compose.yml.
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Application — PHP-FPM 8.4, Composer, Node, Supervisor (queue + scheduler)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: ecos-erp/app:latest
    container_name: ecos-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Persistent runtime data only.  Application source is baked into the image.
      # Mounting source here would shadow the image contents and is FORBIDDEN in production.
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Web server — Custom nginx image with the React SPA baked in
  #
  # Built from Stage 4 of docker/php/Dockerfile (target: nginx).
  # Contains: nginx:1.27-alpine + public/app (Vite build) + default vhost.
  # No bind-mount of backend/public is needed or allowed in production.
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx
    image: ecos-erp/nginx:latest
    container_name: ecos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Config mount only — allows vhost tuning without a full image rebuild.
      # The SPA files inside the image are NOT affected by this mount.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Database — MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: ecos-mysql
    restart: unless-stopped
    command: --mysql-native-password=OFF
    environment:
      MYSQL_DATABASE: ecos_erp
      MYSQL_USER: ecos
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Africa/Cairo
    ports:
      - "127.0.0.1:3306:3306"   # localhost only — not publicly exposed
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/ecos.cnf:ro
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecos", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Cache / Queue backend — Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"   # localhost only — not publicly exposed
    volumes:
      - redis-data:/data
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Mail — Mailpit (SMTP sink + web UI for development / staging)
  # Remove this service or replace with a real MTA in production.
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecos-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:1025:1025"   # SMTP  — localhost only
      - "127.0.0.1:8025:8025"   # Web UI — localhost only (SSH tunnel for remote access)
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# -----------------------------------------------------------------------------
# Named volumes
#
# app-storage  : Laravel storage/ (uploads, framework cache, logs, sessions)
# app-cache    : Laravel bootstrap/cache/ (config, route, view caches)
# mysql-data   : MySQL data directory
# redis-data   : Redis AOF persistence
#
# NEVER replace app-storage or app-cache with source bind-mounts in production.
# -----------------------------------------------------------------------------
volumes:
  app-storage:
    driver: local
  app-cache:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local

# -----------------------------------------------------------------------------
# Bridge network — isolated inter-service communication
# -----------------------------------------------------------------------------
networks:
  ecos-network:
    driver: bridge
