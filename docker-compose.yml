name: ecos-erp

# =============================================================================
# ECOS ERP — Production Docker Compose
#
# Architecture: immutable image-based deployment.
# Every service runs from a built image. No application source code is
# bind-mounted. Runtime-mutable data lives in named volumes only.
#
# Services
#   app      PHP 8.4-FPM + Supervisor (queue worker + scheduler)
#   nginx    Static server + PHP-FPM proxy (SPA baked into image)
#   mysql    MySQL 8.4
#   redis    Redis 7 (queue backend, cache)
#   mailpit  SMTP sink (replace with real MTA before go-live)
#
# Allowed volumes (named only, never source bind-mounts):
#   app-storage   Laravel storage/     (uploads, sessions, logs)
#   app-cache     bootstrap/cache/     (artisan optimize output)
#   mysql-data    MySQL data directory
#   redis-data    Redis AOF persistence
#
# Development overrides live in docker-compose.override.yml and are
# auto-merged by Docker Compose locally. deploy.sh targets this file
# explicitly via -f docker-compose.yml to prevent that merge on the server.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — PHP-FPM 8.4 + Supervisor
  # Runs: php-fpm, artisan queue:work, artisan schedule:work
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: ecos-erp/app:latest
    container_name: ecos-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Runtime-mutable paths ONLY.
      # Source code is baked into the image — mounting it here would shadow
      # vendor/, public/app, and all build artefacts. FORBIDDEN in production.
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecos-network
    healthcheck:
      # Pings the PHP-FPM process via its FastCGI management interface.
      # Requires libfcgi-bin in the image (installed in Dockerfile Stage 3).
      test:
        - "CMD-SHELL"
        - >
          SCRIPT_NAME=/fpm-ping
          SCRIPT_FILENAME=/fpm-ping
          REQUEST_METHOD=GET
          cgi-fcgi -bind -connect 127.0.0.1:9000 >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s   # entrypoint runs migrations + optimize; allow time

  # ---------------------------------------------------------------------------
  # nginx — Custom image with React SPA + build-info baked in (Stage 4)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx
    image: ecos-erp/nginx:latest
    container_name: ecos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Vhost config only — allows tuning without a full image rebuild.
      # The SPA and build-info inside the image are NOT affected by this mount.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # mysql — MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: ecos-mysql
    restart: unless-stopped
    command: --mysql-native-password=OFF
    environment:
      MYSQL_DATABASE:      ecos_erp
      MYSQL_USER:          ecos
      MYSQL_PASSWORD:      secret
      MYSQL_ROOT_PASSWORD: root
      TZ:                  Africa/Cairo
    ports:
      - "127.0.0.1:3306:3306"   # localhost-only; not publicly exposed
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/ecos.cnf:ro
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecos", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # redis — Redis 7 (queue + cache backend)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"   # localhost-only
    volumes:
      - redis-data:/data
    networks:
      - ecos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # mailpit — SMTP sink + web UI
  # Replace with a real MTA (SES / Mailgun / Postfix) before production go-live.
  # All ports are bound to 127.0.0.1 — not publicly reachable.
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecos-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES:             500
      MP_SMTP_AUTH_ACCEPT_ANY:     1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI (SSH-tunnel for remote access)
    networks:
      - ecos-network

# =============================================================================
# Named volumes
#
# NEVER replace app-storage or app-cache with source bind-mounts in production.
# =============================================================================
volumes:
  app-storage:
    driver: local
  app-cache:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  ecos-network:
    driver: bridge
